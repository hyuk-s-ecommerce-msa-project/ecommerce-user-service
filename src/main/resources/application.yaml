server:
  port: 8081

spring:
  threads:
    virtual:
      enabled: true
  application:
    name: user-service
  profiles:
    active: dev
  cloud:
    config:
      name: gameinfo,user-service
  config:
    import:
      - "optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}"

logging:
  level:
    root: INFO
    org.springframework.data.redis: ERROR
    io.lettuce.core: ERROR